<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heimilið</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#EFE7DA;        /* warm background */
  --sand-2:#E6DBC9;      /* slightly deeper sand */
  --paper:#FBF7F0;       /* card surface */
  --ink:#2C2620;         /* primary text */
  --ink-soft:#6B6256;    /* secondary text */
  --line:#D9CDB8;        /* hairlines */
  --coral:#D2603A;       /* primary accent */
  --coral-soft:#F0C9B8;
  --sage:#7C8A6B;        /* task */
  --sky:#5E7E94;         /* event */
  --plum:#8A6A86;        /* shopping */
  --amber:#C99A3A;       /* waiting / á bið */
  --green:#5C8A5C;       /* done */
  --shadow:0 1px 2px rgba(44,38,32,.08), 0 4px 14px rgba(44,38,32,.06);
  --radius:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--sand);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  padding-bottom:84px;
  min-height:100vh;
  overscroll-behavior-y:none;
}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;margin:0;letter-spacing:-.01em;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:16px;}

/* ---------- Header ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg,var(--sand) 70%,rgba(239,231,218,0));
  padding:18px 20px 10px;
}
.topbar .greet{font-size:13px;color:var(--ink-soft);letter-spacing:.03em;text-transform:uppercase;}
.topbar h1{font-size:30px;margin-top:2px;}
.topbar h1 .dot{color:var(--coral);}

/* ---------- Layout ---------- */
.screen{display:none;padding:6px 20px 24px;animation:fade .25s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ---------- Dashboard panels ---------- */
.panel{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.panel-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.panel-head h2{font-size:19px;}
.panel-head .count{font-size:12px;color:var(--ink-soft);background:var(--sand-2);padding:2px 9px;border-radius:20px;font-weight:500;}
.panel .empty{color:var(--ink-soft);font-size:14px;font-style:italic;padding:6px 0;}

/* item row */
.row{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-top:1px solid var(--line);}
.row:first-of-type{border-top:none;}
.row .tick{
  width:22px;height:22px;border-radius:7px;border:2px solid var(--line);
  flex-shrink:0;margin-top:1px;display:grid;place-items:center;transition:.15s;
}
.row .tick.done{background:var(--green);border-color:var(--green);}
.row .tick svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:.15s;}
.row .tick.done svg{opacity:1;}
.row .body{flex:1;min-width:0;}
.row .ttl{font-size:15px;line-height:1.35;}
.row.is-done .ttl{text-decoration:line-through;color:var(--ink-soft);}
.row .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;letter-spacing:.01em;white-space:nowrap;}
.tag.who{background:var(--sand-2);color:var(--ink-soft);}
.tag.cat-task{background:rgba(124,138,107,.16);color:#5a6a4c;}
.tag.cat-shopping{background:rgba(138,106,134,.16);color:#6f5169;}
.tag.cat-event{background:rgba(94,126,148,.16);color:#476073;}
.tag.due{background:var(--coral-soft);color:#9c4423;}
.tag.due.overdue{background:#E8B4A4;color:#8a2f15;}

/* ---------- Board (Kanban) ---------- */
.board-hint{font-size:13px;color:var(--ink-soft);margin:0 0 12px;}
.board{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px;margin:0 -20px;padding-left:20px;padding-right:20px;}
.board::-webkit-scrollbar{display:none;}
.col{
  flex:0 0 84%;max-width:340px;scroll-snap-align:center;
  background:var(--sand-2);border-radius:var(--radius);padding:12px;
}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px;}
.col-head .name{font-family:'Fraunces',serif;font-weight:600;font-size:17px;display:flex;align-items:center;gap:8px;}
.col-head .swatch{width:9px;height:9px;border-radius:50%;}
.col-head .n{font-size:12px;color:var(--ink-soft);font-weight:500;}
.col[data-status="todo"] .swatch{background:var(--ink-soft);}
.col[data-status="byrjad"] .swatch{background:var(--sky);}
.col[data-status="abid"] .swatch{background:var(--amber);}
.col[data-status="buid"] .swatch{background:var(--green);}
.card{
  background:var(--paper);border:1px solid var(--line);border-radius:12px;
  padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);
}
.card .ct{font-size:14px;line-height:1.35;}
.card .cmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;align-items:center;}
.card .move{display:flex;gap:6px;margin-top:9px;}
.card .move button{
  flex:1;font-size:12px;font-weight:600;padding:7px;border-radius:8px;
  background:var(--sand-2);color:var(--ink-soft);transition:.15s;
}
.card .move button:active{background:var(--coral);color:#fff;}
.card .move button.solo{flex:0 0 auto;padding:7px 12px;}
.col .empty{color:var(--ink-soft);font-size:13px;font-style:italic;text-align:center;padding:14px 0;}

/* ---------- Items list ---------- */
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.filters::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;font-size:13px;font-weight:500;padding:7px 15px;border-radius:20px;
  background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);transition:.15s;
}
.chip.active{background:var(--ink);color:var(--sand);border-color:var(--ink);}

/* ---------- FAB ---------- */
.fab{
  position:fixed;right:20px;bottom:96px;z-index:45;
  width:58px;height:58px;border-radius:50%;background:var(--coral);color:#fff;
  display:grid;place-items:center;box-shadow:0 6px 20px rgba(210,96,58,.4);
  font-size:30px;line-height:1;transition:transform .15s;
}
.fab:active{transform:scale(.92);}

/* ---------- Bottom nav ---------- */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--paper);border-top:1px solid var(--line);
  display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -2px 12px rgba(44,38,32,.05);
}
.nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0;color:var(--ink-soft);font-size:11px;font-weight:500;border-radius:12px;transition:.15s;
}
.nav button svg{width:23px;height:23px;stroke:currentColor;stroke-width:1.9;fill:none;}
.nav button.active{color:var(--coral);}

/* ---------- Modal / sheet ---------- */
.sheet-bg{
  position:fixed;inset:0;z-index:60;background:rgba(44,38,32,.4);
  opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(2px);
}
.sheet-bg.open{opacity:1;pointer-events:auto;}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;
  background:var(--sand);border-radius:24px 24px 0 0;
  padding:8px 20px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
  max-height:92vh;overflow-y:auto;
}
.sheet.open{transform:none;}
.grab{width:38px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 16px;}
.sheet h2{font-size:22px;margin-bottom:18px;}
.field{margin-bottom:15px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.02em;}
.field input[type=text],.field textarea,.field input[type=date]{
  width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;
  background:var(--paper);color:var(--ink);
}
.field textarea{resize:none;min-height:70px;}
.seg{display:flex;gap:7px;flex-wrap:wrap;}
.seg button{
  flex:1;min-width:70px;padding:11px 6px;border-radius:11px;background:var(--paper);
  border:1.5px solid var(--line);color:var(--ink-soft);font-size:13px;font-weight:600;transition:.15s;
}
.seg button.sel{background:var(--ink);color:var(--sand);border-color:var(--ink);}
.sheet-actions{display:flex;gap:10px;margin-top:22px;}
.btn-primary{flex:1;background:var(--coral);color:#fff;font-weight:600;font-size:16px;padding:15px;border-radius:13px;transition:.15s;}
.btn-primary:active{transform:scale(.98);}
.btn-ghost{padding:15px 18px;border-radius:13px;color:var(--coral);font-weight:600;font-size:15px;}
.btn-del{width:100%;margin-top:12px;padding:13px;border-radius:12px;color:#a23a1f;font-weight:600;font-size:14px;background:rgba(210,96,58,.08);}

.section-label{font-family:'Fraunces',serif;font-size:14px;color:var(--ink-soft);margin:18px 0 8px;letter-spacing:.02em;}
</style>
</head>
<body>

<div class="topbar">
  <div class="greet" id="greet">Góðan dag</div>
  <h1>Heimilið<span class="dot">.</span></h1>
</div>

<!-- ============ DASHBOARD ============ -->
<section class="screen active" id="screen-dash">
  <div class="panel" id="p-week">
    <div class="panel-head"><h2>Þessa viku</h2><span class="count" id="c-week">0</span></div>
    <div id="list-week"></div>
  </div>
  <div class="panel" id="p-tasks">
    <div class="panel-head"><h2>Verkefni</h2><span class="count" id="c-tasks">0</span></div>
    <div id="list-tasks"></div>
  </div>
  <div class="panel" id="p-shop">
    <div class="panel-head"><h2>Innkaupalisti</h2><span class="count" id="c-shop">0</span></div>
    <div id="list-shop"></div>
  </div>
  <div class="panel" id="p-wait">
    <div class="panel-head"><h2>Á bið</h2><span class="count" id="c-wait">0</span></div>
    <div id="list-wait"></div>
  </div>
  <div class="panel" id="p-90">
    <div class="panel-head"><h2>Næstu 90 dagar</h2><span class="count" id="c-90">0</span></div>
    <div id="list-90"></div>
  </div>
</section>

<!-- ============ BOARD ============ -->
<section class="screen" id="screen-board">
  <p class="board-hint">Strjúktu til hliðar til að sjá dálka · ýttu á ← → til að færa</p>
  <div class="board" id="board"></div>
</section>

<!-- ============ ITEMS ============ -->
<section class="screen" id="screen-items">
  <div class="filters" id="filters">
    <button class="chip active" data-f="all">Allt</button>
    <button class="chip" data-f="task">Verkefni</button>
    <button class="chip" data-f="shopping">Innkaup</button>
    <button class="chip" data-f="event">Viðburðir</button>
  </div>
  <div id="items-list"></div>
</section>

<button class="fab" id="fab" aria-label="Bæta við">+</button>

<!-- ============ NAV ============ -->
<nav class="nav">
  <button class="active" data-screen="dash">
    <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg>Heim
  </button>
  <button data-screen="board">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="11" rx="1"/><rect x="17" y="4" width="5" height="14" rx="1"/></svg>Tafla
  </button>
  <button data-screen="items">
    <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Allt
  </button>
</nav>

<!-- ============ ADD/EDIT SHEET ============ -->
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h2 id="sheetTitle">Nýtt atriði</h2>
  <div class="field">
    <label>Titill</label>
    <input type="text" id="f-title" placeholder="Hvað þarf að gera?" autocomplete="off">
  </div>
  <div class="field">
    <label>Flokkur</label>
    <div class="seg" id="f-cat">
      <button data-v="task" class="sel">Verkefni</button>
      <button data-v="shopping">Innkaup</button>
      <button data-v="event">Viðburður</button>
    </div>
  </div>
  <div class="field" id="field-status">
    <label>Staða</label>
    <div class="seg" id="f-status">
      <button data-v="todo" class="sel">Verkefnalisti</button>
      <button data-v="byrjad">Byrjað</button>
      <button data-v="abid">Á bið</button>
      <button data-v="buid">Búið</button>
    </div>
  </div>
  <div class="field">
    <label>Fyrir hvern</label>
    <div class="seg" id="f-who">
      <button data-v="me" class="sel">Þú</button>
      <button data-v="her">Hún</button>
      <button data-v="both">Bæði</button>
    </div>
  </div>
  <div class="field">
    <label>Dagsetning (valfrjálst)</label>
    <input type="date" id="f-due">
  </div>
  <div class="field">
    <label>Athugasemd (valfrjálst)</label>
    <textarea id="f-notes" placeholder="Nánari upplýsingar…"></textarea>
  </div>
  <div class="sheet-actions">
    <button class="btn-ghost" id="cancelBtn">Hætta við</button>
    <button class="btn-primary" id="saveBtn">Vista</button>
  </div>
  <button class="btn-del" id="delBtn" style="display:none">Eyða atriði</button>
</div>

<script>
/* ============================================================
   DATA LAYER  —  the only place that touches storage.
   Swap these four functions for Supabase later; nothing
   else in the app needs to change.
   ============================================================ */
const Store = (() => {
  const KEY = 'heimili.items.v1';
  let cache = null;
  function _load(){
    if(cache) return cache;
    try{ cache = JSON.parse(localStorage.getItem(KEY)) || []; }
    catch{ cache = []; }
    return cache;
  }
  function _save(){ localStorage.setItem(KEY, JSON.stringify(cache)); }
  return {
    all(){ return _load().slice(); },
    add(item){
      item.id = 'i'+Date.now()+Math.random().toString(36).slice(2,6);
      item.createdAt = Date.now();
      _load().push(item); _save(); return item;
    },
    update(id, patch){
      const it = _load().find(x=>x.id===id);
      if(it) Object.assign(it, patch);
      _save();
    },
    remove(id){
      cache = _load().filter(x=>x.id!==id); _save();
    }
  };
})();

/* ============================================================
   APP STATE & CONSTANTS
   ============================================================ */
const STATUSES = [
  {id:'todo',   name:'Verkefnalisti'},
  {id:'byrjad', name:'Byrjað'},
  {id:'abid',   name:'Á bið'},
  {id:'buid',   name:'Búið'},
];
const CAT_NAME = {task:'Verkefni', shopping:'Innkaup', event:'Viðburður'};
const WHO_NAME = {me:'Þú', her:'Hún', both:'Bæði'};
let activeFilter = 'all';
let editingId = null;

/* ============================================================
   HELPERS
   ============================================================ */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const startOfToday = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr+'T00:00:00');
  return Math.round((d - startOfToday())/86400000);
}
function dueLabel(dateStr){
  const n = daysUntil(dateStr);
  if(n===null) return null;
  if(n<0) return {txt:Math.abs(n)+' d. liðnir', over:true};
  if(n===0) return {txt:'Í dag', over:false};
  if(n===1) return {txt:'Á morgun', over:false};
  if(n<7) return {txt:'Eftir '+n+' daga', over:false};
  const d=new Date(dateStr+'T00:00:00');
  return {txt:d.toLocaleDateString('is-IS',{day:'numeric',month:'short'}), over:false};
}
function tickSVG(){ return '<svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"/></svg>'; }

function rowHTML(it, opts={}){
  const done = it.status==='buid';
  const dl = dueLabel(it.due);
  let meta = '';
  if(opts.showCat) meta += `<span class="tag cat-${it.category}">${CAT_NAME[it.category]}</span>`;
  meta += `<span class="tag who">${WHO_NAME[it.who]}</span>`;
  if(dl) meta += `<span class="tag due ${dl.over?'overdue':''}">${dl.txt}</span>`;
  const canTick = it.category==='task' || it.category==='shopping';
  return `<div class="row ${done?'is-done':''}" data-id="${it.id}">
    <div class="tick ${done?'done':''} ${canTick?'':'hidden-tick'}" data-act="tick" style="${canTick?'':'visibility:hidden'}">${tickSVG()}</div>
    <div class="body" data-act="open">
      <div class="ttl">${escapeHTML(it.title)}</div>
      <div class="meta">${meta}</div>
    </div>
  </div>`;
}
function escapeHTML(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ============================================================
   RENDER: DASHBOARD
   ============================================================ */
function renderDash(){
  const items = Store.all();
  const fill = (sel, list, emptyMsg, showCat) => {
    const box = $(sel);
    if(!list.length){ box.innerHTML = `<div class="empty">${emptyMsg}</div>`; return; }
    box.innerHTML = list.map(it=>rowHTML(it,{showCat})).join('');
  };

  // This week: anything with a due date in next 7 days (incl overdue), not done
  const week = items.filter(it=>{
    if(it.status==='buid') return false;
    const n = daysUntil(it.due);
    return n!==null && n<7;
  }).sort((a,b)=>daysUntil(a.due)-daysUntil(b.due));
  fill('#list-week', week, 'Ekkert á dagskrá þessa viku.', true);
  $('#c-week').textContent = week.length;

  // Tasks not done
  const tasks = items.filter(it=>it.category==='task' && it.status!=='buid')
    .sort((a,b)=>STATUSES.findIndex(s=>s.id===a.status)-STATUSES.findIndex(s=>s.id===b.status));
  fill('#list-tasks', tasks, 'Engin opin verkefni. 🎉', false);
  $('#c-tasks').textContent = tasks.length;

  // Shopping
  const shop = items.filter(it=>it.category==='shopping' && it.status!=='buid');
  fill('#list-shop', shop, 'Innkaupalistinn er tómur.', false);
  $('#c-shop').textContent = shop.length;

  // Waiting = tasks in Á bið
  const wait = items.filter(it=>it.category==='task' && it.status==='abid');
  fill('#list-wait', wait, 'Ekkert á bið.', false);
  $('#c-wait').textContent = wait.length;

  // 90 days
  const up = items.filter(it=>{
    if(it.status==='buid') return false;
    const n = daysUntil(it.due);
    return n!==null && n>=0 && n<=90;
  }).sort((a,b)=>daysUntil(a.due)-daysUntil(b.due));
  fill('#list-90', up, 'Ekkert framundan næstu 90 daga.', true);
  $('#c-90').textContent = up.length;
}

/* ============================================================
   RENDER: BOARD
   ============================================================ */
function renderBoard(){
  const items = Store.all().filter(it=>it.category==='task');
  $('#board').innerHTML = STATUSES.map((st,i)=>{
    const cards = items.filter(it=>it.status===st.id);
    const inner = cards.length ? cards.map(it=>{
      const dl = dueLabel(it.due);
      const left = i>0 ? `<button data-id="${it.id}" data-dir="-1">←</button>` : '';
      const right = i<STATUSES.length-1 ? `<button data-id="${it.id}" data-dir="1">→</button>` : '';
      let cmeta = `<span class="tag who">${WHO_NAME[it.who]}</span>`;
      if(dl) cmeta += `<span class="tag due ${dl.over?'overdue':''}">${dl.txt}</span>`;
      return `<div class="card">
        <div class="ct" data-act="open" data-id="${it.id}">${escapeHTML(it.title)}</div>
        <div class="cmeta">${cmeta}</div>
        <div class="move">${left}${right||(i===STATUSES.length-1?'<button class="solo" data-id="'+it.id+'" data-dir="-1">←</button>':'')}</div>
      </div>`;
    }).join('') : '<div class="empty">Tómt</div>';
    return `<div class="col" data-status="${st.id}">
      <div class="col-head"><span class="name"><span class="swatch"></span>${st.name}</span><span class="n">${cards.length}</span></div>
      ${inner}
    </div>`;
  }).join('');
}

/* ============================================================
   RENDER: ITEMS
   ============================================================ */
function renderItems(){
  let items = Store.all();
  if(activeFilter!=='all') items = items.filter(it=>it.category===activeFilter);
  items.sort((a,b)=>b.createdAt-a.createdAt);
  const box = $('#items-list');
  if(!items.length){ box.innerHTML = `<div class="panel"><div class="empty">Ekkert hér enn. Ýttu á + til að bæta við.</div></div>`; return; }
  // group by category when showing all
  if(activeFilter==='all'){
    const groups = {task:[],event:[],shopping:[]};
    items.forEach(it=>groups[it.category].push(it));
    box.innerHTML = ['task','event','shopping'].filter(c=>groups[c].length).map(c=>
      `<div class="section-label">${CAT_NAME[c]}</div><div class="panel">${groups[c].map(it=>rowHTML(it,{showCat:false})).join('')}</div>`
    ).join('');
  } else {
    box.innerHTML = `<div class="panel">${items.map(it=>rowHTML(it,{showCat:false})).join('')}</div>`;
  }
}

function renderAll(){ renderDash(); renderBoard(); renderItems(); }

  $$('.nav button').forEach(x=>x.classList.remove('active'));

  $('#screen-'+b.dataset.screen).classList.add('active');

/* ============================================================
   SHEET (add / edit)
   ============================================================ */
const sheet = $('#sheet'), sheetBg = $('#sheetBg');
function pick(groupSel, val){
  $$(groupSel+' button').forEach(b=>b.classList.toggle('sel', b.dataset.v===val));
}
function getPick(groupSel){
  const el = $(groupSel+' button.sel'); return el?el.dataset.v:null;
}
function toggleStatusField(){
  $('#field-status').style.display = getPick('#f-cat')==='task' ? 'block':'none';
}
$$('#f-cat button').forEach(b=>b.addEventListener('click',()=>{pick('#f-cat',b.dataset.v);toggleStatusField();}));
$$('#f-status button').forEach(b=>b.addEventListener('click',()=>pick('#f-status',b.dataset.v)));
$$('#f-who button').forEach(b=>b.addEventListener('click',()=>pick('#f-who',b.dataset.v)));

function openSheet(item){
  editingId = item ? item.id : null;
  $('#sheetTitle').textContent = item ? 'Breyta atriði' : 'Nýtt atriði';
  $('#f-title').value = item ? item.title : '';
  $('#f-due').value = item ? (item.due||'') : '';
  $('#f-notes').value = item ? (item.notes||'') : '';
  pick('#f-cat', item ? item.category : 'task');
  pick('#f-status', item ? (item.status||'todo') : 'todo');
  pick('#f-who', item ? item.who : 'me');
  toggleStatusField();
  $('#delBtn').style.display = item ? 'block':'none';
  sheetBg.classList.add('open'); sheet.classList.add('open');
  if(!item) setTimeout(()=>$('#f-title').focus(),300);
}
function closeSheet(){ sheet.classList.remove('open'); sheetBg.classList.remove('open'); editingId=null; }

$('#fab').addEventListener('click',()=>openSheet(null));
$('#cancelBtn').addEventListener('click',closeSheet);
sheetBg.addEventListener('click',closeSheet);

$('#saveBtn').addEventListener('click',()=>{
  const title = $('#f-title').value.trim();
  if(!title){ $('#f-title').focus(); return; }
  const cat = getPick('#f-cat');
  const data = {
    title,
    category: cat,
    status: cat==='task' ? getPick('#f-status') : 'todo',
    who: getPick('#f-who'),
    due: $('#f-due').value || null,
    notes: $('#f-notes').value.trim() || null,
  };
  if(editingId) Store.update(editingId, data);
  else Store.add(data);
  closeSheet(); renderAll();
});
$('#delBtn').addEventListener('click',()=>{
  if(editingId && confirm('Eyða þessu atriði?')){ Store.remove(editingId); closeSheet(); renderAll(); }
});

/* ============================================================
   DELEGATED ACTIONS  (tick, open, move)
   ============================================================ */
document.body.addEventListener('click', e=>{
  // tick complete
  const tick = e.target.closest('[data-act="tick"]');
  if(tick){
    const row = tick.closest('[data-id]'); const id = row.dataset.id;
    const it = Store.all().find(x=>x.id===id);
    if(it){
      const nv = it.status==='buid' ? (it.category==='task'?'todo':'todo') : 'buid';
      Store.update(id,{status:nv}); renderAll();
    }
    return;
  }
  // open editor
  const op = e.target.closest('[data-act="open"]');
  if(op){
    const id = op.dataset.id || op.closest('[data-id]')?.dataset.id;
    const it = Store.all().find(x=>x.id===id);
    if(it) openSheet(it);
    return;
  }
  // board move
  const mv = e.target.closest('.move button, .card .move button');
  if(mv && mv.dataset.dir){
    const id = mv.dataset.id, dir = +mv.dataset.dir;
    const it = Store.all().find(x=>x.id===id);
    if(it){
      const idx = STATUSES.findIndex(s=>s.id===it.status);
      const ni = Math.min(STATUSES.length-1, Math.max(0, idx+dir));
      Store.update(id,{status:STATUSES[ni].id}); renderAll();
    }
  }
});
